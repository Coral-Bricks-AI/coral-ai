syntax = "proto3";
package gpu_inference;

service InferenceService {
    // Run embedding inference on pre-tokenized tensors
    rpc Infer (InferRequest) returns (InferResponse);
    // Health and load check
    rpc HealthCheck (HealthRequest) returns (HealthResponse);
}

message InferRequest {
    string request_id = 1;                // correlation ID from gateway
    repeated TensorRow input_ids = 2;     // shape [N, seq_len] (legacy per-row)
    repeated TensorRow attention_mask = 3; // shape [N, seq_len] (legacy per-row)
    int32 bucket_max_len = 4;             // bucket threshold used for padding
    int32 max_wait_ms = 5;                // client-side timeout hint
    // Bulk tensor transfer as raw bytes (preferred over per-row)
    bytes input_ids_bytes = 6;            // int32 row-major [N * seq_len]
    bytes attention_mask_bytes = 7;       // int32 row-major [N * seq_len]
    int32 num_items = 8;                  // N (for reshaping bytes)
    int32 seq_len = 9;                    // seq_len (for reshaping bytes)
}

message TensorRow {
    repeated int32 values = 1;            // one row of token ids or mask values
}

message InferResponse {
    string request_id = 1;
    Status status = 2;
    repeated EmbeddingRow embeddings = 3; // shape [N, D] (legacy per-row)
    Timings timings = 4;
    string error_code = 5;
    string error_message = 6;
    // Bulk embedding transfer as raw bytes (preferred over per-row)
    bytes embeddings_bytes = 7;           // float32 row-major [N * D]
    int32 embedding_dim = 8;             // D (for reshaping bytes)
}

message EmbeddingRow {
    repeated float values = 1;
}

message Timings {
    float queue_wait_ms = 1;
    float encoding_ms = 2;
    float total_ms = 3;
}

enum Status {
    COMPLETED = 0;
    ERROR = 1;
}

message HealthRequest {}

message HealthResponse {
    string status = 1;                         // "healthy" | "degraded" | "overloaded"
    bool accepting_requests = 2;
    int64 queued_tokens = 3;
    float service_rate_tokens_per_sec = 4;
    float estimated_drain_time_ms = 5;
    float p95_server_side_latency_ms = 6;
    int32 gpu_queue_depth = 7;
    int64 uptime_seconds = 8;
}

